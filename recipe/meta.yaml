{% set name = "torchdiffeq" %}
{% set version = "0.2.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b50d3760d13fd138dcceac651f4b80396f44fefcebd037a033fecfeaa9cc12e7

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - python >=3.6
    - pytorch
    - scipy

test:
  imports:
    - torchdiffeq
    - torchdiffeq._impl

about:
  home: https://github.com/rtqichen/torchdiffeq
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: ODE solvers and adjoint sensitivity analysis in PyTorch.
  doc_url: https://pypi.org/project/torchdiffeq/#description
  dev_url: https://github.com/rtqichen/torchdiffeq

extra:
  recipe-maintainers:
    - mxr-conda
    - ndmaxar
    - rluria14
    - oblute
